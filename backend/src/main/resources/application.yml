spring:
  application:
    name: sora-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sora}
    username: ${DB_USER:sora}
    password: ${DB_PASSWORD:sora}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # create-drop: builds the schema on startup and drops it on shutdown.
      # Fine for development; we'll switch to 'validate' + Flyway migrations later.
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false   # avoids lazy-loading surprises; always fetch in the service layer
    properties:
      hibernate:
        format_sql: true

  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://models.inference.ai.azure.com
      chat:
        options:
          model: gpt-4o-mini

app:
  jwt:
    secret: ${JWT_SECRET}          # set in application-local.yml or env var
    expiration-ms: 86400000        # 24 hours

server:
  port: 8080
