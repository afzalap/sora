services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: sora-postgres
    environment:
      POSTGRES_DB: sora
      POSTGRES_USER: sora
      POSTGRES_PASSWORD: sora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sora -d sora"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
